<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 250px;
      padding: 15px;
      font-family: Arial, sans-serif;
    }

    .header {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .info {
      font-size: 14px;
      margin-bottom: 15px;
    }

    .provider-group {
      margin: 10px 0 14px;
      padding: 10px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      background: #fafafa;
    }

    .provider-group label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 6px;
      color: #333;
    }

    .provider-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .provider-chip {
      width: auto;
      margin-top: 0;
      padding: 6px 10px;
      border: 1px solid #cfd6e4;
      border-radius: 999px;
      background: white;
      color: #2b3a55;
      font-size: 12px;
      line-height: 1.2;
    }

    .provider-chip:hover {
      background: #eef4ff;
      border-color: #8aa8e8;
    }

    .provider-chip.active {
      background: #2f6feb;
      border-color: #2f6feb;
      color: white;
    }

    .provider-chip:disabled {
      border-color: #d8d8d8;
      background: #efefef;
      color: #888;
    }

    .help-text {
      font-size: 12px;
      margin-top: 6px;
      color: #666;
    }

    .progress-container {
      display: none !important;
    }

    .progress-bar,
    .progress-fill,
    .progress-text,
    .stats-text {
      display: none !important;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 10px;
      background-color: #4285f4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #3367d6;
    }

    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="header">LLM Translator</div>

  <div class="info">Click the "Translate" button to translate the page.</div>

  <div class="provider-group">
    <label id="providerLabel">LLM Provider</label>
    <div id="providerButtons" class="provider-buttons"></div>
    <div class="help-text" id="providerHelp">Choose the provider used for translation.</div>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">Translating... 0%</div>
    <div class="stats-text" id="statsText"></div>
  </div>

  <button id="translateBtn">Translate</button>
  <button id="translateAllBtn">Translate All</button>
  <button id="excludeBtn">Don't translate this site</button>
  <button id="optionsBtn">Open Settings</button>

  <div class="status" id="statusText"></div>

  <script src="popup.js"></script>
</body>

</html>
